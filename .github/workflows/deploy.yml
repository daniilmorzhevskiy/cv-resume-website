name: Deploy to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to S3
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: http://epam-aws-fundamentals-task-danylo-morzhevskyi.s3-website-us-east-1.amazonaws.com
          AWS_ACCESS_KEY_ID: AKIAVERQWTT3QS4KR2GI
          AWS_SECRET_ACCESS_KEY: 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
